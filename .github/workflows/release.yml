name: Release to TestFlight

# Runs only on version tags (e.g., v0.1.0) or manual dispatch.
# Leaves the existing build.yml unsigned dev builds untouched.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — build & sign but skip TestFlight upload and GitHub release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  release:
    # macos-26 runner ships with Xcode 26 + iOS 26 SDK preinstalled.
    # Required by Apple's April 28, 2026 ITMS-90725 SDK cutoff — apps built
    # with iOS 18.5 SDK (Xcode 16 on macos-15) are rejected from App Store
    # Connect uploads after that date.
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache Xcode DerivedData + Swift Package Manager artifacts between runs
      # to avoid recompiling unchanged sources/dependencies. Keyed on the SHA
      # of every Swift source + project.yml so any change invalidates the
      # cache; falls back to most recent partial match. Saves ~2-3 min on
      # warm runs.
      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: derived-${{ runner.os }}-xcode26-${{ hashFiles('**/*.swift', 'project.yml', 'VoltraLive/Info.plist', 'VoltraLive/VoltraLive.entitlements') }}
          restore-keys: |
            derived-${{ runner.os }}-xcode26-

      - name: Select Xcode 26 (iOS 26 SDK)
        run: |
          # Prefer the explicitly-versioned Xcode 26 install; fall back to the
          # 'Xcode.app' default on macos-26 (which is also Xcode 26).
          if [ -d /Applications/Xcode_26.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      # Inject Team ID into environment so XcodeGen sees ${APPLE_TEAM_ID:-}
      - name: Generate Xcode project (with Team ID)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          export APPLE_TEAM_ID="${APPLE_TEAM_ID}"
          xcodegen generate

      # v0.4.6.3: substitute Demo Mode trace-relay placeholders in Info.plist.
      # The DemoTraceEndpoint and DemoTraceSharedToken values come from
      # GitHub Secrets so they don't have to be committed. Empty values are
      # tolerated by the iOS uploader — it just surfaces a clear error.
      - name: Inject Demo Mode trace relay config into Info.plist
        env:
          DEMO_TRACE_ENDPOINT: ${{ secrets.DEMO_TRACE_ENDPOINT }}
          DEMO_TRACE_SHARED_TOKEN: ${{ secrets.DEMO_TRACE_SHARED_TOKEN }}
        run: |
          set -euo pipefail
          PLIST=VoltraLive/Info.plist
          # plutil -replace handles the value safely without re-formatting
          # the rest of the plist. Use empty string when secret is unset.
          plutil -replace DemoTraceEndpoint -string "${DEMO_TRACE_ENDPOINT:-}" "$PLIST"
          plutil -replace DemoTraceSharedToken -string "${DEMO_TRACE_SHARED_TOKEN:-}" "$PLIST"
          # Sanity-print whether values were set, without echoing them.
          plutil -extract DemoTraceEndpoint xml1 -o - "$PLIST" \
            | grep -q '<string></string>' \
            && echo "DemoTraceEndpoint: <empty>" \
            || echo "DemoTraceEndpoint: set ($(plutil -extract DemoTraceEndpoint raw -o - "$PLIST" | wc -c | tr -d ' ') bytes)"
          plutil -extract DemoTraceSharedToken xml1 -o - "$PLIST" \
            | grep -q '<string></string>' \
            && echo "DemoTraceSharedToken: <empty>" \
            || echo "DemoTraceSharedToken: set"

      # Write the .p8 key file where xcodebuild expects it
      - name: Install App Store Connect API key
        env:
          API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          # Use printf (not echo) to preserve the literal newlines inside the
          # PEM-formatted .p8 key. echo with a multi-line secret can drop the
          # trailing newline, which makes xcodebuild's JWT signer reject the
          # key with "Authentication failed".
          printf '%s\n' "${API_PRIVATE_KEY}" > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          # Sanity-check the key file shape without leaking contents.
          KEY_FILE=~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          echo "Key file size: $(wc -c < "$KEY_FILE") bytes, lines: $(wc -l < "$KEY_FILE")"
          head -1 "$KEY_FILE" | grep -q 'BEGIN PRIVATE KEY' && echo "Header OK" || echo "WARN: missing BEGIN header"
          tail -1 "$KEY_FILE" | grep -q 'END PRIVATE KEY' && echo "Footer OK" || echo "WARN: missing END footer"

      # Independently verify the ASC API key auths against Apple's REST API
      # before xcodebuild touches it. If this prints OK, the secret values are
      # valid and the bug is inside xcodebuild's JWT/profile flow. If it prints
      # a 401/403, the secret itself is wrong (revoked / wrong team / no role).
      - name: Verify ASC API key (independent JWT smoke test)
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set +e
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography
          cat > /tmp/asc_smoke.py <<'PY'
          import os, time, jwt, urllib.request, urllib.error, json, sys
          key_id = os.environ['API_KEY_ID']
          iss    = os.environ['API_ISSUER_ID']
          with open(os.path.expanduser(f"~/.appstoreconnect/private_keys/AuthKey_{key_id}.p8")) as f:
              pem = f.read()
          now = int(time.time())
          token = jwt.encode(
              {"iss": iss, "iat": now, "exp": now + 600, "aud": "appstoreconnect-v1"},
              pem,
              algorithm="ES256",
              headers={"kid": key_id, "typ": "JWT"},
          )
          print(f"JWT minted, length={len(token)}")
          req = urllib.request.Request(
              "https://api.appstoreconnect.apple.com/v1/apps?limit=5",
              headers={"Authorization": f"Bearer {token}"},
          )
          try:
              with urllib.request.urlopen(req, timeout=20) as resp:
                  body = json.loads(resp.read().decode())
                  apps = body.get("data", [])
                  print(f"ASC /v1/apps OK status={resp.status} returned {len(apps)} apps")
                  for a in apps:
                      attrs = a.get("attributes", {})
                      print(f"  - {attrs.get('bundleId','?')}  ({attrs.get('name','?')})")
          except urllib.error.HTTPError as e:
              body = e.read().decode(errors="replace")
              print(f"ASC FAILED: HTTP {e.code} {e.reason}")
              print(body[:500])
              sys.exit(2)
          except Exception as e:
              print(f"ASC FAILED: {type(e).__name__}: {e}")
              sys.exit(3)
          # Probe the provisioning endpoints xcodebuild needs (only reached if /v1/apps OK).
          for endpoint, label in [
              ("/v1/users",                  "users"),
              ("/v1/profiles?limit=200",     "profiles"),
              ("/v1/certificates?limit=200", "certificates"),
              ("/v1/bundleIds?limit=200",    "bundleIds"),
          ]:
              url = "https://api.appstoreconnect.apple.com" + endpoint
              req2 = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
              try:
                  with urllib.request.urlopen(req2, timeout=20) as r2:
                      d = json.loads(r2.read().decode())
                      rows = d.get("data", [])
                      print(f"  probe {label:>13}: HTTP {r2.status}, {len(rows)} entries")
                      if label == "profiles":
                          for p in rows[:12]:
                              pa = p.get("attributes", {})
                              print(f"    profile name={pa.get('name','?')!r} type={pa.get('profileType','?')} state={pa.get('profileState','?')}")
                      if label == "certificates":
                          for c in rows[:8]:
                              ca = c.get("attributes", {})
                              print(f"    cert name={ca.get('name','?')!r} type={ca.get('certificateType','?')}")
              except urllib.error.HTTPError as e2:
                  body2 = e2.read().decode(errors="replace")
                  print(f"  probe {label:>13}: HTTP {e2.code} {e2.reason}")
                  print(f"    body[:300]: {body2[:300]}")
              except Exception as e2:
                  print(f"  probe {label:>13}: {type(e2).__name__}: {e2}")
          PY
          python3 /tmp/asc_smoke.py
          echo "smoke exit: $?"
          set -e

      # Run protocol unit tests BEFORE we burn signing credentials.
      # If the wire format regressed, fail fast — don't ship a broken IPA to TestFlight.
      - name: Run protocol unit tests
        run: |
          # macos-26 ships with modern iPad simulators only (no iPad 10th gen).
          # Pick the first available iPhone simulator at runtime so this stays
          # forward-compatible as runner images change.
          DEVICE_ID=$(xcrun simctl list devices available --json | \
            python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; print(next(dev['udid'] for runtime in d for dev in d[runtime] if dev.get('isAvailable') and 'iPhone' in dev.get('name','')))")
          echo "Using simulator: $DEVICE_ID"
          xcodebuild test \
            -project VoltraLive.xcodeproj \
            -scheme VoltraLive \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -only-testing:VoltraLiveTests \
            CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      # ─────────────────────────────────────────────────────────────────
      # Signing approach: stored cert+profile.
      # We tried programmatic provisioning via the ASC REST API and ran into
      # a wall — the iCloud-container endpoints are not exposed to API keys
      # (every variant of /v1/{i,c}loudContainers returns HTTP 404
      # NOT_FOUND), and without the container association the auto-issued
      # profile is missing entitlements the app declares.
      #
      # Instead, we keep a Distribution cert + App Store profile inside
      # GitHub Secrets (one-time human setup in the Apple Developer portal)
      # and just decode them here. No REST calls, no recurring revoke
      # emails, deterministic across runs.
      #
      # Required secrets (set once via gh secret set / Settings → Secrets):
      #   APPLE_DIST_CERT_P12        — base64 of distribution cert .p12
      #   APPLE_DIST_CERT_P12_PASS   — password used when exporting the .p12
      #   APPLE_PROFILE_MOBILEPROV   — base64 of the .mobileprovision file
      #   APPLE_PROFILE_NAME         — exact profile name (matches Xcode)
      # ─────────────────────────────────────────────────────────────────
      - name: Decode signing assets from GitHub Secrets
        env:
          DIST_CERT_P12: ${{ secrets.APPLE_DIST_CERT_P12 }}
          DIST_CERT_P12_PASS: ${{ secrets.APPLE_DIST_CERT_P12_PASS }}
          PROFILE_MOBILEPROV: ${{ secrets.APPLE_PROFILE_MOBILEPROV }}
          PROFILE_NAME_IN: ${{ secrets.APPLE_PROFILE_NAME }}
        run: |
          set -euo pipefail
          mkdir -p build/signing
          # Validate every required secret is set before doing anything else.
          # Empty secret = base64 -d of empty string = empty file = cryptic
          # downstream errors. Fail fast with a clear message.
          missing=()
          [ -n "${DIST_CERT_P12:-}" ]         || missing+=("APPLE_DIST_CERT_P12")
          [ -n "${DIST_CERT_P12_PASS:-}" ]    || missing+=("APPLE_DIST_CERT_P12_PASS")
          [ -n "${PROFILE_MOBILEPROV:-}" ]    || missing+=("APPLE_PROFILE_MOBILEPROV")
          [ -n "${PROFILE_NAME_IN:-}" ]       || missing+=("APPLE_PROFILE_NAME")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "❌ Missing required GitHub Secrets:"; printf '  - %s\n' "${missing[@]}"
            echo "See SIGNING-SETUP.md in the repo root for the one-time setup steps."
            exit 1
          fi
          # Decode the .p12 and .mobileprovision into build/signing/.
          printf '%s' "${DIST_CERT_P12}"     | base64 -d > build/signing/dist.p12
          printf '%s' "${PROFILE_MOBILEPROV}" | base64 -d > build/signing/profile.mobileprovision
          # Sanity-check sizes (PKCS12 is usually ~3-5 KB; profile ~10 KB)
          echo "dist.p12 size:                $(wc -c < build/signing/dist.p12) bytes"
          echo "profile.mobileprovision size: $(wc -c < build/signing/profile.mobileprovision) bytes"
          # Extract the profile UUID from the embedded plist so we can install
          # it under the right filename (xcodebuild looks up profiles by UUID).
          PROFILE_UUID=$(security cms -D -i build/signing/profile.mobileprovision | plutil -extract UUID raw -o - -)
          if [ -z "$PROFILE_UUID" ]; then
            echo "❌ Failed to extract UUID from .mobileprovision"; exit 1
          fi
          echo "profile UUID: $PROFILE_UUID"
          echo "profile name: $PROFILE_NAME_IN"
          # Surface for downstream steps (archive/export read $PROFILE_NAME)
          {
            echo "PROFILE_UUID=$PROFILE_UUID"
            echo "PROFILE_NAME=$PROFILE_NAME_IN"
            echo "KEYCHAIN_PASSWORD=$GITHUB_RUN_ID"
            echo "DIST_CERT_P12_PASS=$DIST_CERT_P12_PASS"
          } >> "$GITHUB_ENV"
          # The huge inline Python provisioning script that used to live here
          # is gone — see commit history if you need to resurrect REST flow.
          : <<'OBSOLETE_REST_PROVISIONING_BLOCK'
          import os, time, json, subprocess, base64, urllib.request, urllib.error, sys, tempfile
          import jwt
          key_id = os.environ['API_KEY_ID']
          iss    = os.environ['API_ISSUER_ID']
          team   = os.environ['APPLE_TEAM_ID']
          BUNDLE = "com.voltralive.app"
          PROFILE_NAME = "VOLTRA Live App Store (CI managed)"
          with open(os.path.expanduser(f"~/.appstoreconnect/private_keys/AuthKey_{key_id}.p8")) as f:
              pem = f.read()
          def jwtok():
              now = int(time.time())
              return jwt.encode({"iss": iss, "iat": now, "exp": now + 600,
                                 "aud": "appstoreconnect-v1"},
                                pem, algorithm="ES256",
                                headers={"kid": key_id, "typ": "JWT"})
          def api(method, path, body=None):
              url = "https://api.appstoreconnect.apple.com" + path
              data = json.dumps(body).encode() if body is not None else None
              req = urllib.request.Request(url, data=data, method=method,
                                           headers={"Authorization": f"Bearer {jwtok()}",
                                                    "Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      body_bytes = r.read()
                      body_obj = json.loads(body_bytes.decode()) if body_bytes else {}
                      return r.status, body_obj
              except urllib.error.HTTPError as e:
                  err_bytes = e.read()
                  err_obj = json.loads(err_bytes.decode()) if err_bytes else {}
                  return e.code, err_obj

          # 1. Find or create the iOS Distribution cert.
          # Generate a new EC P-256 keypair + CSR using openssl (universally available).
          os.makedirs("build/signing", exist_ok=True)
          subprocess.check_call([
              "openssl", "genrsa", "-out", "build/signing/dist.key", "2048"
          ], stderr=subprocess.DEVNULL)
          subprocess.check_call([
              "openssl", "req", "-new",
              "-key", "build/signing/dist.key",
              "-out", "build/signing/dist.csr",
              "-subj", f"/CN=Apple Distribution {team}/C=US"
          ], stderr=subprocess.DEVNULL)
          with open("build/signing/dist.csr") as f:
              csr_pem = f.read()
          # Strip PEM headers, base64 the inner content (strict CSR base64)
          csr_inner = csr_pem.replace("-----BEGIN CERTIFICATE REQUEST-----", "").replace("-----END CERTIFICATE REQUEST-----", "").replace("\n", "").strip()
          # Apple allows only one active Distribution cert per account. Each CI run
          # generates a fresh keypair, so the previous cert's private key is gone -
          # we must revoke any existing DISTRIBUTION certs before creating a new one.
          status, resp = api("GET", "/v1/certificates?limit=200")
          if status == 200:
              for c in resp.get("data", []):
                  ctype = c["attributes"].get("certificateType", "")
                  if ctype == "DISTRIBUTION":
                      did, _ = api("DELETE", f"/v1/certificates/{c['id']}")
                      print(f"revoked stale DISTRIBUTION cert {c['id']} -> HTTP {did}")
          status, resp = api("POST", "/v1/certificates", {
              "data": {
                  "type": "certificates",
                  "attributes": {
                      "certificateType": "DISTRIBUTION",
                      "csrContent": csr_inner,
                  }
              }
          })
          print(f"create cert -> HTTP {status}")
          if status != 201:
              print(json.dumps(resp, indent=2)[:1500])
              sys.exit(10)
          cert = resp["data"]
          cert_id = cert["id"]
          cert_b64 = cert["attributes"]["certificateContent"]  # DER base64
          # Write .cer (DER) for security cli
          with open("build/signing/dist.cer", "wb") as f:
              f.write(base64.b64decode(cert_b64))
          print(f"distribution cert id={cert_id}, name={cert['attributes'].get('name','?')}")

          # 2. Find the bundleId resource id for com.voltralive.app
          status, resp = api("GET", f"/v1/bundleIds?filter[identifier]={BUNDLE}")
          assert status == 200 and resp["data"], f"no bundleId match: {resp}"
          bundle_resource_id = resp["data"][0]["id"]
          print(f"bundleId resource id: {bundle_resource_id}")

          # 2b. Ensure required capabilities are enabled on the bundle ID.
          # The app declares HealthKit + iCloud (CloudKit + Documents) + iCloud Container
          # + ubiquity-kvstore. HealthKit is already enabled. We need to make sure the
          # iCloud capability is on, with the iCloud.com.voltralive.app container
          # associated. ubiquity-kvstore is implied by the iCloud capability.
          ICLOUD_CONTAINER_ID = "iCloud.com.voltralive.app"
          # Look up or create the iCloud container resource.
          status, resp = api("GET", f"/v1/cloudContainers?filter[identifier]={urllib.parse.quote(ICLOUD_CONTAINER_ID)}")
          container_resource_id = None
          if status == 200 and resp.get("data"):
              container_resource_id = resp["data"][0]["id"]
              print(f"found iCloud container resource id: {container_resource_id}")
          else:
              status, resp = api("POST", "/v1/cloudContainers", {
                  "data": {
                      "type": "cloudContainers",
                      "attributes": {
                          "identifier": ICLOUD_CONTAINER_ID,
                          "name": "VOLTRA Live iCloud",
                      },
                  }
              })
              if status == 201:
                  container_resource_id = resp["data"]["id"]
                  print(f"created iCloud container resource id: {container_resource_id}")
              else:
                  print(f"iCloud container create -> HTTP {status}")
                  print(json.dumps(resp, indent=2)[:1200])
                  sys.exit(20)

          # List existing capabilities on the bundle ID to see what we already have.
          status, resp = api("GET", f"/v1/bundleIds/{bundle_resource_id}/bundleIdCapabilities?limit=200")
          existing_caps = {}
          if status == 200:
              for c in resp.get("data", []):
                  existing_caps[c["attributes"].get("capabilityType")] = c["id"]
          print(f"existing bundleIdCapabilities: {list(existing_caps.keys())}")

          # If ICLOUD already enabled, delete it so we can re-create with our specific
          # settings + container relationship. (The PATCH semantics for capability
          # settings are inconsistent across capability types; delete-then-create is
          # the documented pattern.)
          if "ICLOUD" in existing_caps:
              did, _ = api("DELETE", f"/v1/bundleIdCapabilities/{existing_caps['ICLOUD']}")
              print(f"deleted existing ICLOUD capability -> HTTP {did}")

          # Create ICLOUD capability with CloudKit + CloudDocuments enabled and our
          # container associated. The settings list mirrors what Xcode would set.
          status, resp = api("POST", "/v1/bundleIdCapabilities", {
              "data": {
                  "type": "bundleIdCapabilities",
                  "attributes": {
                      "capabilityType": "ICLOUD",
                      "settings": [
                          {
                              "key": "ICLOUD_VERSION",
                              "options": [{"key": "XCODE_6"}],
                          }
                      ],
                  },
                  "relationships": {
                      "bundleId": {"data": {"type": "bundleIds", "id": bundle_resource_id}},
                      "cloudContainers": {"data": [{"type": "cloudContainers", "id": container_resource_id}]},
                  }
              }
          })
          print(f"create ICLOUD capability -> HTTP {status}")
          if status not in (200, 201):
              print(json.dumps(resp, indent=2)[:1500])
              # Don't abort yet - try without the container, some accounts use a different
              # relationship key. Fallback: attach container to existing capability.
              sys.exit(21)

          # 3. Create the App Store profile.
          # Try delete-then-create idempotency: list profiles by name and delete matching
          status, resp = api("GET", f"/v1/profiles?filter[name]={urllib.parse.quote(PROFILE_NAME)}") if False else api("GET", "/v1/profiles?limit=200")
          if status == 200:
              for p in resp.get("data", []):
                  if p["attributes"]["name"] == PROFILE_NAME:
                      did, _ = api("DELETE", f"/v1/profiles/{p['id']}")
                      print(f"deleted stale profile {p['id']} -> HTTP {did}")
          status, resp = api("POST", "/v1/profiles", {
              "data": {
                  "type": "profiles",
                  "attributes": {
                      "name": PROFILE_NAME,
                      "profileType": "IOS_APP_STORE",
                  },
                  "relationships": {
                      "bundleId":     {"data": {"type": "bundleIds",   "id": bundle_resource_id}},
                      "certificates": {"data": [{"type": "certificates", "id": cert_id}]},
                  }
              }
          })
          print(f"create profile -> HTTP {status}")
          if status != 201:
              print(json.dumps(resp, indent=2)[:1500])
              sys.exit(11)
          prof = resp["data"]
          prof_b64 = prof["attributes"]["profileContent"]
          prof_uuid = prof["attributes"]["uuid"]
          prof_name = prof["attributes"]["name"]
          with open("build/signing/profile.mobileprovision", "wb") as f:
              f.write(base64.b64decode(prof_b64))
          print(f"profile uuid={prof_uuid}, name={prof_name}")
          # Hand off identifiers via GITHUB_OUTPUT-equivalent env file
          with open(os.environ["GITHUB_ENV"], "a") as gh:
              gh.write(f"PROFILE_UUID={prof_uuid}\n")
              gh.write(f"PROFILE_NAME={prof_name}\n")
              gh.write(f"CERT_ID={cert_id}\n")
          print("OK: cert + profile created and exported via GITHUB_ENV")
          OBSOLETE_REST_PROVISIONING_BLOCK
          # End of obsolete block. The decode logic above is what actually runs.

      - name: Install cert + profile into runner keychain
        run: |
          set -euo pipefail
          # The .p12 is already in build/signing/ from the decode step.
          # The password is whatever the human used when exporting from
          # Keychain Access (or the CLI), passed in via DIST_CERT_P12_PASS env.
          # Use a temp keychain so we never touch the runner's login keychain.
          KEYCHAIN="$RUNNER_TEMP/voltra.keychain-db"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          # Add to the active search list (preserve login.keychain too)
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"' | tr -s ' ' '\n' | grep -v '^$' | grep -v "$KEYCHAIN" || true)
          # The keychain password (KEYCHAIN_PASSWORD) is independent of the
          # .p12 export password (DIST_CERT_P12_PASS) — don't conflate them.
          security import build/signing/dist.p12 \
            -k "$KEYCHAIN" -P "${DIST_CERT_P12_PASS}" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "$KEYCHAIN"

          # Install the .mobileprovision so xcodebuild discovers it.
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp build/signing/profile.mobileprovision \
            "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"

          echo "Installed identities:"
          security find-identity -v -p codesigning "$KEYCHAIN"
          echo "Installed profiles:"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/"

      # Archive with MANUAL signing pointed at the stored profile.
      # No -allowProvisioningUpdates — the cert + profile are already
      # installed in the temp keychain and ~/Library/MobileDevice/, so
      # xcodebuild has zero work to do beyond signing.
      - name: Build and archive (signed)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          xcodebuild \
            -project VoltraLive.xcodeproj \
            -scheme VoltraLive \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/VoltraLive.xcarchive \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${PROFILE_NAME}" \
            archive

      # Generate ExportOptions.plist at runtime so APPLE_TEAM_ID stays a secret
      - name: Export IPA for App Store Connect
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key><true/>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.voltralive.app</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/VoltraLive.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      # Verify IPA exists before doing anything destructive — fails fast if signing/export broke
      - name: Verify signed IPA
        run: |
          set -euo pipefail
          ls -la build/export/
          test -f build/export/VoltraLive.ipa
          echo "Signed IPA size: $(du -h build/export/VoltraLive.ipa | cut -f1)"

      # Build 31 fix: HR was broken on the shipped build because we had no
      # way to detect when entitlements got dropped during signing. Unzip
      # the signed IPA, dump the embedded entitlements, and HARD-FAIL the
      # build if HealthKit isn't there. Same check for iCloud/CloudKit so
      # we catch silent regressions on those too.
      # b49: HARDENED. The previous version did `grep -q
      # "com.apple.developer.healthkit"` which matched .healthkit AND
      # .healthkit.access AND .healthkit.background-delivery as substrings,
      # so it could not detect the b47/b48 bug where the signed app was
      # missing the .access and .background-delivery keys despite the
      # provisioning profile granting all three. b49 parses both the
      # codesign-extracted app entitlements AND the embedded provisioning
      # profile's Entitlements dict with plistlib and asserts EXACT key
      # presence on each side. Hard-fails on any mismatch.
      - name: Verify embedded entitlements (HealthKit, iCloud) [b49 hardened]
        run: |
          set -euo pipefail
          mkdir -p build/verify
          cd build/verify
          unzip -q ../export/VoltraLive.ipa
          APP_PATH="Payload/VOLTRA Live.app"
          test -d "$APP_PATH" || { echo "FAIL: .app not found inside IPA"; ls -la Payload/; exit 1; }

          echo "— Extracting signed app entitlements (xml1)"
          codesign -d --entitlements :- "$APP_PATH" > /tmp/app.entitlements.xml 2>/dev/null
          plutil -convert xml1 /tmp/app.entitlements.xml -o /tmp/app.entitlements.plist

          echo "— Extracting embedded mobileprovision Entitlements"
          openssl smime -inform der -verify -noverify -in "$APP_PATH/embedded.mobileprovision" > /tmp/profile.full.plist
          plutil -extract Entitlements xml1 -o /tmp/profile.entitlements.plist /tmp/profile.full.plist

          echo "— Running plistlib-based exact-key verification"
          # Write the verification script to a file to avoid YAML/heredoc
          # indentation pitfalls (Python is whitespace-sensitive and YAML
          # block scalars normalize indentation in surprising ways).
          cat > /tmp/verify_entitlements.py <<'PY'
          import plistlib, sys

          REQUIRED_APP_KEYS = [
              "com.apple.developer.healthkit",
              "com.apple.developer.healthkit.access",
              "com.apple.developer.healthkit.background-delivery",
              "com.apple.developer.icloud-services",
              "com.apple.developer.icloud-container-identifiers",
              "com.apple.developer.ubiquity-container-identifiers",
          ]
          REQUIRED_PROFILE_KEYS = [
              "com.apple.developer.healthkit",
              "com.apple.developer.healthkit.access",
              "com.apple.developer.healthkit.background-delivery",
              "com.apple.developer.icloud-services",
          ]

          with open("/tmp/app.entitlements.plist", "rb") as f:
              app = plistlib.load(f)
          with open("/tmp/profile.entitlements.plist", "rb") as f:
              prof = plistlib.load(f)

          print("--- App entitlements (signed binary) ---")
          for k in sorted(app.keys()):
              print("  " + k + ": " + repr(app[k]))
          print("--- Profile Entitlements (allowlist) ---")
          for k in sorted(prof.keys()):
              print("  " + k + ": " + repr(prof[k]))

          fails = []
          for k in REQUIRED_APP_KEYS:
              if k not in app:
                  fails.append("app missing required key: " + k)
          for k in REQUIRED_PROFILE_KEYS:
              if k not in prof:
                  fails.append("profile missing required key: " + k)
          for k in app.keys():
              if k.startswith("com.apple.developer.") and k not in prof:
                  fails.append("app declares " + k + " but profile does not allow it")

          if app.get("com.apple.developer.healthkit") is not True:
              fails.append("com.apple.developer.healthkit must be True in app entitlements")
          if not isinstance(app.get("com.apple.developer.healthkit.access"), list):
              fails.append(".healthkit.access must be a list (empty array is fine)")
          if app.get("com.apple.developer.healthkit.background-delivery") is not True:
              fails.append(".healthkit.background-delivery must be True in app entitlements")

          if fails:
              print("\nFAIL: entitlement verification failed")
              for f_ in fails:
                  print("  - " + f_)
              print("\nRemediation: ensure VoltraLive/VoltraLive.entitlements declares")
              print("all three HealthKit keys (.healthkit = true, .healthkit.access = <array/>,")
              print(".healthkit.background-delivery = true) to match the profile allowlist.")
              print("See b49 WORK_LOG entry for full diagnosis.")
              sys.exit(1)

          print("\nOK: app entitlements + profile allowlist both verified - all keys match")
          PY
          # Strip the leading 10 spaces of YAML indentation that the heredoc
          # picked up; the YAML run: scalar indents lines uniformly so we
          # can dedent cleanly with sed.
          sed -i 's/^          //' /tmp/verify_entitlements.py
          python3 /tmp/verify_entitlements.py

          cd - >/dev/null
          rm -rf build/verify

      # Diagnostic: inspect the SIGNED, EXPORTED IPA — what actually goes to TestFlight.
      # This must run AFTER export-archive, since signing happens at export time.
      # Upload to TestFlight using the App Store Connect API key (no Apple ID password needed)
      # Skipped on dry-run dispatch — lets us validate the signing pipeline without burning a build number.
      - name: Upload to TestFlight via altool
        if: github.event_name == 'push' || github.event.inputs.dry_run == 'false'
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          # altool sometimes returns exit 0 even when validation fails (409 etc).
          # Tee output and grep for the failure marker so the workflow actually
          # fails when Apple rejects the build.
          set +e
          xcrun altool --upload-app \
            --type ios \
            --file build/export/VoltraLive.ipa \
            --apiKey "${API_KEY_ID}" \
            --apiIssuer "${API_ISSUER_ID}" 2>&1 | tee /tmp/altool.log
          ALTOOL_EXIT=${PIPESTATUS[0]}
          set -e
          if [ "$ALTOOL_EXIT" -ne 0 ]; then
            echo "::error::altool exited with code $ALTOOL_EXIT"
            exit $ALTOOL_EXIT
          fi
          if grep -qiE 'UPLOAD FAILED|Validation failed|ERROR ITMS-' /tmp/altool.log; then
            echo "::error::altool reported a failure in its output (see log above)"
            exit 1
          fi
          echo "altool upload succeeded."

      # On dry-run, surface the IPA as a workflow artifact instead of uploading
      - name: Upload IPA as workflow artifact (dry-run only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: VoltraLive-dryrun-ipa
          path: build/export/VoltraLive.ipa
          retention-days: 7

      # Also attach the signed IPA to the GitHub release for the tag (skipped on dry-run)
      - name: Publish signed IPA to GitHub release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-manual}"
          gh release create "${TAG}" build/export/VoltraLive.ipa \
            --repo "$GITHUB_REPOSITORY" \
            --title "VOLTRA Live ${TAG}" \
            --notes "Signed build ${TAG} — also submitted to TestFlight. Build commit: ${GITHUB_SHA}." \
            2>/dev/null || \
          gh release upload "${TAG}" build/export/VoltraLive.ipa \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
