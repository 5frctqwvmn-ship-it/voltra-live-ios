name: Build VoltraLive IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned, iphoneos SDK)
        run: |
          xcodebuild \
            -project VoltraLive.xcodeproj \
            -scheme VoltraLive \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ENABLE_BITCODE=NO \
            build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found. Listing build products:"
            ls -la build/Build/Products/Release-iphoneos/ || true
            exit 1
          fi
          echo "Found app bundle: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry VoltraLive.ipa Payload
          rm -rf Payload
          echo "IPA size: $(du -sh VoltraLive.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoltraLive-unsigned
          path: VoltraLive.ipa
          retention-days: 30
