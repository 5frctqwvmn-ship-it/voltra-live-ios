name: Build VoltraLive IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # macos-26 runner ships with Xcode 26 + iOS 26 SDK preinstalled.
    # Required by Apple's April 28, 2026 ITMS-90725 SDK cutoff — apps built
    # with iOS 18.5 SDK (Xcode 16 on macos-15) are rejected from App Store
    # Connect uploads after that date.
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26 (iOS 26 SDK)
        run: |
          # Prefer the explicitly-versioned Xcode 26 install; fall back to the
          # 'Xcode.app' default on macos-26 (which is also Xcode 26).
          if [ -d /Applications/Xcode_26.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned, iphoneos SDK)
        run: |
          xcodebuild \
            -project VoltraLive.xcodeproj \
            -scheme VoltraLive \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ENABLE_BITCODE=NO \
            build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          # Pin to the iOS app bundle by exact name; the Watch companion produces
          # 'VOLTRA Live Watch.app' which is NOT a valid iOS IPA payload.
          APP_PATH="build/Build/Products/Release-iphoneos/VOLTRA Live.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name 'VOLTRA Live.app' -print -quit)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found. Listing build products:"
            ls -la build/Build/Products/Release-iphoneos/ || true
            exit 1
          fi
          echo "Found app bundle: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry VoltraLive.ipa Payload
          rm -rf Payload
          echo "IPA size: $(du -sh VoltraLive.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoltraLive-unsigned
          path: VoltraLive.ipa
          retention-days: 30

      - name: Publish rolling "latest" release with IPA
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Delete any prior "latest" release so we always have a fresh download.
          gh release delete latest --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          gh release create latest VoltraLive.ipa \
            --repo "$GITHUB_REPOSITORY" \
            --title "VoltraLive (latest unsigned IPA)" \
            --notes "Unsigned IPA built by CI from commit $GITHUB_SHA. Sideload via AltStore / SideStore. Re-signed on-device by your free Apple ID; refresh weekly."
