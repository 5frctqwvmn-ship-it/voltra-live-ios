name: VoltraLive
options:
  bundleIdPrefix: com.voltralive
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: none

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.voltralive.app
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_IDENTITY: ""
    ENABLE_BITCODE: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    INFOPLIST_FILE: VoltraLive/Info.plist
    SWIFT_OPTIMIZATION_LEVEL: "-O"
    DEVELOPMENT_TEAM: "${APPLE_TEAM_ID:-}"

targets:
  VoltraLive:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VoltraLive
        excludes:
          - "**/*.md"
    resources:
      - path: VoltraLive/Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: "VOLTRA Live"
        PRODUCT_MODULE_NAME: VoltraLive
        INFOPLIST_FILE: VoltraLive/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.voltralive.app
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: "${APPLE_TEAM_ID:-}"
    dependencies:
      - sdk: CoreBluetooth.framework
    info:
      path: VoltraLive/Info.plist
      properties:
        NSBluetoothAlwaysUsageDescription: "VOLTRA Live needs Bluetooth to connect to your VOLTRA device and receive live workout telemetry."
        NSBluetoothPeripheralUsageDescription: "VOLTRA Live needs Bluetooth to connect to your VOLTRA device."
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIUserInterfaceStyle: Dark
        CFBundleDisplayName: "VOLTRA Live"
        CFBundleName: "VoltraLive"
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"

  VoltraLiveTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VoltraLiveTests
    settings:
      base:
        PRODUCT_NAME: "VoltraLiveTests"
        PRODUCT_BUNDLE_IDENTIFIER: com.voltralive.app.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: "${APPLE_TEAM_ID:-}"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/VOLTRA Live.app/VOLTRA Live"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: VoltraLive

schemes:
  VoltraLive:
    build:
      targets:
        VoltraLive: all
        VoltraLiveTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VoltraLiveTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
