name: VoltraLive
options:
  bundleIdPrefix: com.voltralive
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: none

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.voltralive.app
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    # v0.4.6.2: removed CODE_SIGNING_REQUIRED/ALLOWED=NO at the project level.
    # When set in base, Release archive inherited them and emitted an unsigned
    # binary stripped of all entitlements (HealthKit, iCloud, aps-environment).
    # Test invocations pass these flags as per-command xcodebuild args, which
    # is the correctly-scoped way to disable signing only for tests.
    ENABLE_BITCODE: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    INFOPLIST_FILE: VoltraLive/Info.plist
    SWIFT_OPTIMIZATION_LEVEL: "-O"
    DEVELOPMENT_TEAM: "${APPLE_TEAM_ID:-}"

targets:
  VoltraLive:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VoltraLive
        excludes:
          - "**/*.md"
    resources:
      - path: VoltraLive/Assets.xcassets
      # NOTE: seed/history.md is also baked into the binary via
      # VoltraLive/Logging/Import/HistorySeedData.swift as a primary source.
      # The bundle copy is kept as a secondary fallback only.
      - path: seed/history.md
    settings:
      base:
        PRODUCT_NAME: "VOLTRA Live"
        PRODUCT_MODULE_NAME: VoltraLive
        INFOPLIST_FILE: VoltraLive/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.voltralive.app
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        # v0.4.6.2: do NOT set CODE_SIGNING_REQUIRED/ALLOWED=NO at the target level.
        # That setting was getting inherited during Release archive, which made
        # codesign skip entitlement embedding entirely — stripping HealthKit,
        # iCloud, and aps-environment from the signed binary even though the
        # provisioning profile granted them. Tests still pass these flags as
        # per-invocation xcodebuild args, which is the correct scope.
        CODE_SIGN_ENTITLEMENTS: VoltraLive/VoltraLive.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: "${APPLE_TEAM_ID:-}"
        MARKETING_VERSION: "0.4.52"
        CURRENT_PROJECT_VERSION: "83"
    dependencies:
      - sdk: CoreBluetooth.framework
      - sdk: CloudKit.framework
      - sdk: HealthKit.framework
    info:
      path: VoltraLive/Info.plist
      properties:
        NSBluetoothAlwaysUsageDescription: "VOLTRA Live needs Bluetooth to connect to your VOLTRA device and receive live workout telemetry."
        NSBluetoothPeripheralUsageDescription: "VOLTRA Live needs Bluetooth to connect to your VOLTRA device."
        NSHealthShareUsageDescription: "VOLTRA Live reads heart rate and active energy from your Apple Watch workout so you can see live BPM and calories during a session."
        NSHealthUpdateUsageDescription: "VOLTRA Live does not write to Health — this entry is required by the platform."
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIUserInterfaceStyle: Dark
        CFBundleDisplayName: "VOLTRA Live"
        CFBundleName: "VoltraLive"
        CFBundleShortVersionString: "0.4.52"
        CFBundleVersion: "83"
        # Build 31: per-build feature label shown in the on-screen badge so
        # the user knows exactly which one feature this build is testing.
        VOLTRAFeatureLabel: "Telemetry v2 base weight"

  VoltraLiveTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VoltraLiveTests
    settings:
      base:
        PRODUCT_NAME: "VoltraLiveTests"
        PRODUCT_BUNDLE_IDENTIFIER: com.voltralive.app.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: "${APPLE_TEAM_ID:-}"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/VOLTRA Live.app/VOLTRA Live"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: VoltraLive

schemes:
  VoltraLive:
    build:
      targets:
        VoltraLive: all
        VoltraLiveTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VoltraLiveTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
